<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Personal Diary</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="topbar">

    <!-- LEFT: NAVIGATION -->
    <div class="nav">
        <h2 style="margin:0;">
            <a href="/" style="text-decoration:none; color:inherit;">
                📓 Personal Diary
            </a>
        </h2>

        <a href="/">Notes</a>
        <a href="/plans">Plans</a>
    </div>

    <!-- RIGHT: ACTIONS -->
    <div class="actions">
        <button onclick="toggleTheme()" class="btn small">🌙 Theme</button>
        <a href="/add" class="btn small">+ New Note</a>
        <a href="/add_plan" class="btn small">+ Plan</a>
    </div>

</div>

<div class="container">
    {% block content %}{% endblock %}
</div>

<script>
function toggleTheme(){
    document.body.classList.toggle("dark")
    localStorage.setItem("theme",
        document.body.classList.contains("dark") ? "dark" : "light"
    )
}

window.onload = () => {
    if(localStorage.getItem("theme") === "dark"){
        document.body.classList.add("dark")
    }
}
</script>

</body>
</html>
